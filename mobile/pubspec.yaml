name: wardwatch_mobile
description: WardWatch - Civic Accountability App
publish_to: 'none'
version: 2.0.0+1

environment:
  sdk: '>=3.3.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  # Firebase
  firebase_core: ^3.1.0
  firebase_auth: ^5.1.0
  cloud_firestore: ^5.0.2
  firebase_storage: ^12.0.2
  firebase_messaging: ^15.0.2
  firebase_app_check: ^0.3.0+2
  # Google Maps
  google_maps_flutter: ^2.6.1
  # Location
  geolocator: ^12.0.0
  # Camera
  camera: ^0.10.5+9
  image_picker: ^1.1.2
  # Secure Storage
  flutter_secure_storage: ^9.0.0
  # UI
  cupertino_icons: ^1.0.6
  flutter_spinkit: ^5.2.1
  # HTTP
  http: ^1.2.1
  # Utils
  intl: ^0.19.0
  permission_handler: ^11.3.1
  share_plus: ^9.0.0
  cached_network_image: ^3.3.1
  path_provider: ^2.1.3
  path: ^1.9.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/icons/
